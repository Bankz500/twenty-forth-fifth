<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Twenty Forth & Fifth Forgot Password</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    <link rel="icon" href="favicon.png" type="image/png">
    <!-- Include Tailwind CSS -->
    <script src="./tailwind-mono.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Typography + shared site theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./site.css">
    <script src="./components/site-shell.js" defer></script>
    <style>
        :root {
            --bg: #f6f9ff;
            --surface: #ffffff;
            --ink: #09090b;
            --muted: #3f3f46;
            --subtle: #71717a;
            --border: #e4e4e7;
            --brand: #1e40af;
            --brand-hover: #1e3a8a;
        }

        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--ink); letter-spacing: -0.01em; }

        /* Text-based Logo */
        .text-logo {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", sans-serif;
            font-weight: 650;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: var(--ink);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .text-logo .first { color: var(--ink); }
        .text-logo .citizens { color: var(--ink); font-weight: 650; }
        .text-logo .inc {
            font-size: 0.75rem;
            color: var(--subtle);
            font-weight: 600;
            margin-left: 2px;
            vertical-align: super;
        }
        
        /* Primary button */
        .btn-blue {
            background: var(--brand);
            color: white;
            border: 1px solid rgba(16, 43, 99, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .btn-blue:hover {
            background: var(--brand-hover);
            transform: translateY(-1px);
            box-shadow: 0 18px 50px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body class="font-sans antialiased bg-blue-50">

    <div data-include="components/site-header.html"></div>

    <!-- Main Content -->
    <section class="pt-24 md:pt-32 pb-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-center">
                <div class="max-w-md w-full">
                    <!-- Password Reset Card -->
                    <div id="forgot-password-card" class="bg-white border border-blue-100 rounded-3xl p-8 shadow-lg">
                        <!-- Header with icon -->
                        <div class="text-center mb-8">
                            <div class="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 rounded-full px-4 py-2 shadow-sm mb-6">
                                <span class="w-2 h-2 rounded-full bg-blue-600"></span>
                                <span class="text-blue-800 text-xs font-semibold uppercase tracking-wider">Password Reset</span>
                            </div>
                            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-key text-blue-700 text-2xl"></i>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-extrabold text-blue-950 mb-2">Reset Password</h2>
                            <p class="text-blue-800">Enter your email address to receive a password reset link</p>
                        </div>
                        
                        <form id="reset-password-form" class="space-y-6">
                            <div>
                                <label for="reset-email" class="block text-sm font-semibold text-blue-950 mb-2">Email Address</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-blue-600"></i>
                                    </div>
                                    <input 
                                        type="email" 
                                        id="reset-email" 
                                        placeholder="your@email.com" 
                                        required 
                                        class="pl-12 pr-4 py-3.5 w-full border border-blue-200 rounded-xl bg-blue-50 text-blue-950 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                                    />
                                </div>
                            </div>
                            
                            <button 
                                type="submit" 
                                id="reset-button"
                                class="w-full btn-blue text-white font-semibold rounded-xl py-3.5 px-4 transition duration-200 flex items-center justify-center space-x-2 shadow-lg"
                                data-no-loading="true"
                            >
                                <span>Reset Password</span>
                                <i class="fas fa-arrow-right"></i>
                            </button>

                            <!-- Loading Button -->
                            <button 
                                type="button" 
                                id="loading-button"
                                class="w-full btn-blue text-white font-semibold rounded-xl py-3.5 px-4 flex items-center justify-center space-x-2 hidden"
                                disabled
                            >
                                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                                <span>Sending Reset Link...</span>
                            </button>
                        </form>
                
                        <!-- Status Messages -->
                        <div id="success-message" class="mt-6 p-4 bg-blue-50 border border-blue-200 text-blue-950 rounded-xl flex items-start hidden">
                            <i class="fas fa-check-circle text-blue-600 mt-0.5 mr-3 flex-shrink-0"></i>
                            <p class="text-sm">Check your email for a password reset link. The link will expire in 30 minutes.</p>
                        </div>
                
                <div id="error-message" class="mt-6 p-4 bg-blue-50 text-blue-950 rounded-xl flex items-start hidden">
                    <svg class="w-5 h-5 mt-0.5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-sm" id="error-text">Sorry, we couldn't find an account with that email address.</p>
                </div>
        
                <!-- Back to Login Link -->
                <div class="text-center mt-8">
                    <a href="login.html" class="text-blue-950 hover:text-blue-800 text-sm font-medium flex items-center justify-center space-x-2 transition duration-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        <span>Back to Login</span>
                    </a>
                </div>
            </div>

            <!-- Help Section -->
            <div class="mt-8 text-center">
                <p class="text-blue-800 text-sm">Need help? <a href="mailto:bealbanking@gmail.com?subject=Support Inquiry&body=Hello," class="text-blue-950 hover:text-blue-800 font-medium transition duration-300">Contact Support</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase compat SDK - no modules, works everywhere -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var firebaseConfig = {
                apiKey: "AIzaSyA3x-CZApUgkWHCjlwvFtOQhYQeY6lDwpI",
                authDomain: "twenty-forth-fifth.firebaseapp.com",
                projectId: "twenty-forth-fifth",
                storageBucket: "twenty-forth-fifth.firebasestorage.app",
                messagingSenderId: "228269383587",
                appId: "1:228269383587:web:0d6f063f221f388cd2c416",
                measurementId: "G-3X9DT5MBV4"
            };

            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            var auth = firebase.auth();

            var resetForm = document.getElementById('reset-password-form');
            var resetBtn = document.getElementById('reset-button');
            var loadingBtn = document.getElementById('loading-button');
            var successMsg = document.getElementById('success-message');
            var errorMsg = document.getElementById('error-message');
            var errorText = document.getElementById('error-text');

            function hideLoading() {
                if (resetBtn) resetBtn.classList.remove('hidden');
                if (loadingBtn) loadingBtn.classList.add('hidden');
            }

            function showResult(isSuccess, message) {
                hideLoading();
                if (successMsg) successMsg.classList.add('hidden');
                if (errorMsg) errorMsg.classList.add('hidden');
                if (isSuccess && successMsg) {
                    successMsg.classList.remove('hidden');
                } else if (!isSuccess && errorMsg && errorText) {
                    errorText.textContent = message || 'Link not sent. Please try again.';
                    errorMsg.classList.remove('hidden');
                }
            }

            if (!resetForm || !resetBtn || !loadingBtn) {
                console.error('[ForgotPassword] DOM elements not found');
                return;
            }

            resetForm.addEventListener('submit', function(e) {
                e.preventDefault();
                var email = (document.getElementById('reset-email').value || '').trim();
                if (!email) return;

                resetBtn.classList.add('hidden');
                loadingBtn.classList.remove('hidden');
                if (successMsg) successMsg.classList.add('hidden');
                if (errorMsg) errorMsg.classList.add('hidden');

                var done = false;
                var safetyTimer = setTimeout(function() {
                    if (done) return;
                    done = true;
                    console.warn('[ForgotPassword] Safety timeout - clearing loading');
                    showResult(false, 'Request timed out. Please try again.');
                }, 25000);

                var continueUrl = window.location.origin + '/login.html';
                auth.sendPasswordResetEmail(email, { url: continueUrl, handleCodeInApp: false })
                    .then(function() {
                        if (done) return;
                        done = true;
                        clearTimeout(safetyTimer);
                        showResult(true);
                        setTimeout(function() { window.location.href = 'login.html'; }, 5000);
                    })
                    .catch(function(err) {
                        if (done) return;
                        done = true;
                        clearTimeout(safetyTimer);
                        console.error('[ForgotPassword] Error:', err.code, err.message);
                        var msg = err.code === 'auth/user-not-found'
                            ? 'No account found with that email address.'
                            : (err.message || 'Link not sent. Please try again.');
                        showResult(false, msg);
                    });
            });
        });
    </script>

</body>
</html>
